<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapay İkas Mağazası</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 50px; display: flex; flex-direction: column; align-items: center; }
        .product-grid { display: flex; gap: 20px; margin-top: 30px; }
        .product-card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 250px; }
        .product-card img { width: 100%; border-radius: 5px; }
        .product-title { font-size: 18px; font-weight: bold; margin: 15px 0; color: #333; }
        .product-price { font-size: 16px; color: #8a2be2; margin-bottom: 15px; }
        .btn-cart { background: #111; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-cart:hover { background: #333; }
        h1 { color: #111; }
    </style>
</head>
<body>
    <h1>Yapay İkas Mağazası (Test Ortamı)</h1>
    <p>Aşağıdaki ürünlerden birini sepete atarak V3 İsim Avcısı scriptini test edin.</p>
    
    <div class="product-grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300" alt="Saat">
            <div class="product-title">Lüks Siyah Saat</div>
            <div class="product-price">1.250 TL</div>
            <button class="btn-cart">Sepete Ekle</button>
        </div>
        
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300" alt="Ayakkabı">
            <div class="product-title">Kırmızı Spor Ayakkabı</div>
            <div class="product-price">850 TL</div>
            <button class="btn-cart">Sepete Ekle</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300" alt="Kulaklık">
            <div class="product-title">Kablosuz Kulaklık PRO</div>
            <div class="product-price">1.800 TL</div>
            <button class="btn-cart">Sepete Ekle</button>
        </div>
    </div>

    <!-- Bidlirim Widget ve Akıllı Radar Sistemi (V3 - Ürün İsmi Avcısı) -->
    <script src="https://bildirim-c2rk.onrender.com/widget.js" data-store="dev-muhammedyusuf" async></script>
    <script>
      window.addEventListener('click', function(e) {
        let target = e.target;
        let closestBtn = target.closest('button') || target.closest('a');
        let btnText = (target.innerText || (closestBtn ? closestBtn.innerText : '')).toLowerCase();
        
        if (btnText.includes('sepet') || (closestBtn && closestBtn.innerHTML.toLowerCase().includes('cart'))) {
           let pName = 'Harika Bir Ürün';
           let card = target.closest('[class*="product"], [class*="card"], [class*="item"], li');
           
           if (card) {
               let titleEl = card.querySelector('h2, h3, h4, .product-title, [class*="title"], [class*="name"]');
               if (titleEl) pName = titleEl.innerText.trim();
           } else {
               let h1 = document.querySelector('h1');
               if (h1) pName = h1.innerText.trim();
           }
           
           if (window.Bidlirim) window.Bidlirim.track('cart', { productName: pName });
        }
      });
    </script>
</body>
</html>
